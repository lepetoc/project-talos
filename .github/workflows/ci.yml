name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the release (e.g. v1.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'core/**'
              - 'api/**'
              - 'modules/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'

  fmt:
    name: cargo fmt --check
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["--no-default-features", "--all-features"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace ${{ matrix.features }}

  doc:
    name: cargo doc
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --workspace --no-deps

  audit:
    name: cargo audit
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/audit@v1

  frontend:
    name: Frontend Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run linter
        run: npm run lint
        working-directory: frontend
      - name: Check formatting
        run: npm run format:check
        working-directory: frontend
      - name: Build CSS
        run: npm run build:css
        working-directory: frontend

  release:
    name: Release
    needs: [fmt, clippy, test, doc, audit]
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --all-features --package api
      - name: Rename binary
        shell: bash
        run: cp "target/release/api${{ matrix.ext }}" "talos-${{ matrix.platform }}-${{ inputs.tag }}${{ matrix.ext }}"

      # The steps below must only run once, not once per matrix leg — tagging
      # and pushing twice would conflict. Gate them to the linux job only.
      - name: Create and push the release tag
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Generate this release's changelog section
        if: matrix.platform == 'linux'
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release_notes.md

      - name: Prepend it to CHANGELOG.md and commit
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cat release_notes.md CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ inputs.tag }}"
          git push origin HEAD:main

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          body_path: ${{ matrix.platform == 'linux' && 'release_notes.md' || '' }}
          files: talos-${{ matrix.platform }}-${{ inputs.tag }}${{ matrix.ext }}
